# myBeez nginx vhost — apex + wildcard subdomains.
# Symlink from /etc/nginx/sites-enabled/mybeez-ai.com.conf, then
#   nginx -t && systemctl reload nginx
#
# Prerequisites:
#   - Cloudflare Origin Cert at /etc/ssl/cloudflare/mybeez-ai.com.{pem,key}
#     (covers apex + wildcard via 1 cert, generated in CF dashboard)
#   - Cloudflare SSL mode = Full (strict)
#   - DNS A records (apex + *) pointing to this host, proxy ON

upstream mybeez_app {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name mybeez-ai.com *.mybeez-ai.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mybeez-ai.com *.mybeez-ai.com;

    ssl_certificate     /etc/ssl/cloudflare/mybeez-ai.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mybeez-ai.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location / {
        proxy_pass http://mybeez_app;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
