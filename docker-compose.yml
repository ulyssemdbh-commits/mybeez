services:
  app:
    build: .
    container_name: mybeez-app
    restart: always
    env_file: .env.production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mybeez-net

  db:
    image: postgres:16-alpine
    container_name: mybeez-db
    restart: always
    env_file: .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-mybeez}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mybeez-net

volumes:
  pgdata:

networks:
  mybeez-net:
    driver: bridge
